name: Build and Push Docker to ECR

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: my-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code (UPDATED)
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Configure AWS (UPDATED)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ Login to ECR (FIXED INDENT + SECURITY)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      # ✅ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME ./app

      # ✅ Tag image (FIXES YOUR ERROR)
      - name: Tag Docker image
        run: |
          docker tag $IMAGE_NAME:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      # ✅ Push image
      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
